<div class="modal-backdrop" (click)="onClose()"></div>
<div class="modal-dialog">
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">{{ isEditMode ? 'Edit task' : 'Add task' }}</h5>
      <button type="button" class="btn btn-outline-secondary btn-sm" (click)="onClose()">Close</button>
    </div>
    <div class="modal-body">
      <div class="form-group mb-3">
        <label>Task name</label>
        <input type="text" class="form-control" [(ngModel)]="taskName" />
      </div>
      <div class="form-group mb-3">
        <label>Due data</label>
        <input type="date" class="form-control" [(ngModel)]="dueDate" />
      </div>
      <div class="form-group mb-3">
        <label>Status</label>
        <select class="form-control" [(ngModel)]="status">
          <option value="">-- Select status --</option>
          @for (s of statuses; track s.statusTypeId) {
            <option [value]="s.statusTypeId">{{ s.statusName }}</option>
          }
        </select>
      </div>
      <div class="form-group mb-3">
        <label>User</label>
        <select class="form-control" [(ngModel)]="userId">
          <option [ngValue]="null">-- Select user --</option>
          @for (u of users; track u.userId) {
            <option [ngValue]="u.userId">{{ u.username }}</option>
          }
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-primary" (click)="onSave()">Save</button>
    </div>
  </div>
</div>
